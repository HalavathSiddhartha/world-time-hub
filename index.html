<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddhartha's Time Hub</title>
    <style>
        :root { --primary: #2563eb; --ist: #ff9933; --cet: #003399; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; display: flex; justify-content: center; padding: 20px; color: #1e293b; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        header { text-align: center; border-bottom: 2px solid #f1f5f9; margin-bottom: 30px; padding-bottom: 10px; }
        .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .clock-card { padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #e2e8f0; }
        .ist-card { border-top: 5px solid var(--ist); }
        .cet-card { border-top: 5px solid var(--cet); }
        .time-now { font-size: 3rem; font-weight: 800; margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        .converter { background: #f1f5f9; padding: 25px; border-radius: 15px; }
        .conv-row { display: flex; align-items: center; justify-content: space-around; gap: 15px; flex-wrap: wrap; }
        input[type="time"] { padding: 12px; font-size: 1.3rem; border-radius: 10px; border: 2px solid #cbd5e1; outline: none; }
        .swap-btn { font-size: 2rem; cursor: pointer; background: white; border: 1px solid #cbd5e1; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .swap-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .result-box { font-size: 1.5rem; font-weight: 700; color: var(--primary); background: white; padding: 12px 25px; border-radius: 10px; border: 2px solid #cbd5e1; min-width: 150px; text-align: center; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0">World Time Hub</h1>
        <p>Dashboard for <strong>Siddhartha</strong></p>
    </header>

    <div class="hero">
        <div class="clock-card ist-card">
            <label>India (IST)</label>
            <div id="ist-live" class="time-now">--:--:--</div>
        </div>
        <div class="clock-card cet-card">
            <label>Europe (CET/CEST)</label>
            <div id="cet-live" class="time-now">--:--:--</div>
        </div>
    </div>

    <div class="converter">
        <label style="text-align:center; margin-bottom:15px">Smart Converter</label>
        <div class="conv-row">
            <div>
                <label id="lbl-left">From IST</label>
                <input type="time" id="time-input" value="08:00">
            </div>
            <div class="swap-btn" id="swap-btn">⇄</div>
            <div>
                <label id="lbl-right">To CET</label>
                <div id="time-output" class="result-box">--:--</div>
            </div>
        </div>
    </div>
</div>

<script>
    let isIstToCet = true;

    // This calculates the gap between two zones at the current moment
    function getMinutesOffset(zone) {
        const now = new Date();
        const tzDate = new Date(now.toLocaleString("en-US", {timeZone: zone}));
        const utcDate = new Date(now.toLocaleString("en-US", {timeZone: "UTC"}));
        return (tzDate - utcDate) / 60000;
    }

    function runUpdate() {
        const now = new Date();
        const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        
        document.getElementById('ist-live').innerText = now.toLocaleTimeString('en-US', { ...options, timeZone: 'Asia/Kolkata' });
        document.getElementById('cet-live').innerText = now.toLocaleTimeString('en-GB', { ...options, timeZone: 'Europe/Paris', hour12: false });
        
        doConvert();
    }

    function doConvert() {
        const val = document.getElementById('time-input').value;
        if (!val) return;

        const [h, m] = val.split(':').map(Number);
        const istOff = getMinutesOffset('Asia/Kolkata');
        const cetOff = getMinutesOffset('Europe/Paris');

        // Logic: (Target - Source)
        const diff = isIstToCet ? (cetOff - istOff) : (istOff - cetOff);
        
        let totalMins = (h * 60 + m) + diff;
        totalMins = (totalMins + 1440) % 1440; // Clean wrap for 24h

        const resH = Math.floor(totalMins / 60);
        const resM = Math.floor(totalMins % 60);
        
        const ampm = resH >= 12 ? 'pm' : 'am';
        const displayH = resH % 12 || 12;
        const displayM = resM.toString().padStart(2, '0');

        document.getElementById('time-output').innerText = `${displayH}:${displayM} ${ampm}`;
    }

    document.getElementById('swap-btn').onclick = () => {
        isIstToCet = !isIstToCet;
        document.getElementById('lbl-left').innerText = isIstToCet ? "From IST" : "From CET";
        document.getElementById('lbl-right').innerText = isIstToCet ? "To CET" : "To IST";
        doConvert();
    };

    document.getElementById('time-input').oninput = doConvert;
    setInterval(runUpdate, 1000);
    runUpdate();
</script>

</body>
</html>
